name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        working-directory: server
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o ./bin/tma1-server ./cmd/tma1-server

      - name: Package
        run: |
          ARCHIVE="tma1-server-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar -czf "${ARCHIVE}" -C server/bin tma1-server
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256sum"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tma1-server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            tma1-server-*.tar.gz
            tma1-server-*.sha256sum

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tma1-server-*.tar.gz
            tma1-server-*.sha256sum
          generate_release_notes: true
