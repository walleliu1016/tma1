name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Vet
        working-directory: server
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: server

      - name: Test
        working-directory: server
        run: go test -race -count=1 ./...

      - name: Build
        working-directory: server
        run: CGO_ENABLED=0 go build -o ./bin/tma1-server ./cmd/tma1-server

      - name: Cross-compile Windows
        working-directory: server
        env:
          CGO_ENABLED: '0'
          GOOS: windows
          GOARCH: amd64
        run: go build -o /dev/null ./cmd/tma1-server

      - name: Lint JS
        working-directory: server/web
        run: npm ci && npx eslint js/

      - name: Lint install.sh
        run: shellcheck site/public/install.sh

      - name: Lint install.ps1
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          Invoke-ScriptAnalyzer -Path site/public/install.ps1 -EnableExit -Severity Error
