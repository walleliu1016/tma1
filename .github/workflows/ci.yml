name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Vet
        working-directory: server
        run: go vet ./...

      - name: Test
        working-directory: server
        run: go test -race -count=1 ./...

      - name: Build
        working-directory: server
        run: CGO_ENABLED=0 go build -o ./bin/tma1-server ./cmd/tma1-server
